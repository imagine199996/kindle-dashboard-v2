<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { background: black; color: white; font-family: sans-serif; padding: 20px; }
        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body>
    <div id="page-1" class="page active"><h1>News</h1><div id="news-content">Loading...</div></div>
    <div id="page-2" class="page"><h1>Watchlist</h1><div id="finviz-content">Loading...</div></div>
    <div id="page-3" class="page"><h1>Weather</h1><div id="weather-content">Loading...</div></div>

    <script>
        let currentPage = 1;
        async function fetchAndRender() {
            try {
                const response = await fetch('/api/all-data');
                const data = await response.json();
                if (!data) return;
                
                document.getElementById('news-content').innerHTML = (data.news || []).map(n => `<p>${n.title}</p>`).join('');
                document.getElementById('finviz-content').innerHTML = (data.finviz || []).map(s => `<p>${s.ticker}: ${s.change}</p>`).join('');
                document.getElementById('weather-content').innerHTML = (data.weather || []).map(w => `<p>${w.name}: ${w.temp}</p>`).join('');
            } catch (e) { console.error("Fetch Error:", e); }
        }

        setInterval(() => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            currentPage = currentPage >= 3 ? 1 : currentPage + 1;
            document.getElementById(`page-${currentPage}`).classList.add('active');
        }, 30000);

        fetchAndRender();
        setInterval(fetchAndRender, 60000); // 1分钟轮询一次数据
    </script>
</body>
</html>
