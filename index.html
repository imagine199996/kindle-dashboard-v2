<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { background: black; color: white; font-family: sans-serif; padding: 20px; }
        .page { display: none; }
        .active { display: block; }
        h1 { color: #aaa; font-size: 24px; margin-bottom: 20px; }
        p { font-size: 20px; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="page-1" class="page active">
        <h1>News</h1>
        <div id="news-content">Loading...</div>
    </div>
    <div id="page-2" class="page">
        <h1>Watchlist</h1>
        <div id="finviz-content">Loading...</div>
    </div>
    <div id="page-3" class="page">
        <h1>Weather</h1>
        <div id="weather-content">Loading...</div>
    </div>

    <script>
        let currentPage = 1;
        const totalPages = 3;
        const PAGE_DURATION = 30000; 

        async function fetchAndRender() {
            try {
                const response = await fetch('/api/all-data');
                const data = await response.json();
                
                // 渲染新闻：将数组转换成HTML段落
                document.getElementById('news-content').innerHTML = 
                    data.news.map(n => `<p>${n.title}</p>`).join('');
                
                // 渲染股票：将数组转换成HTML段落
                document.getElementById('finviz-content').innerHTML = 
                    data.finviz.map(s => `<p>${s.ticker}: ${s.change}</p>`).join('');
                
                // 渲染天气
                document.getElementById('weather-content').innerHTML = 
                    data.weather.map(w => `<p>${w.name}: ${w.temp}</p>`).join('');
                    
            } catch (e) {
                console.error("Fetch failed", e);
            }
        }

        function rotatePage() {
            document.getElementById(`page-${currentPage}`).classList.remove('active');
            currentPage = currentPage >= totalPages ? 1 : currentPage + 1;
            document.getElementById(`page-${currentPage}`).classList.add('active');
        }

        setInterval(rotatePage, PAGE_DURATION);
        setInterval(fetchAndRender, 10 * 60 * 1000);
        fetchAndRender();
    </script>
</body>
</html>
